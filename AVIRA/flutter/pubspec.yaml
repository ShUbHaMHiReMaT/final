name: avira
description: AVIRA - Advanced Veterinary Intelligence Research & Analytics. AI-powered livestock health monitoring app by PRANIVA.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_blue_plus: ^1.31.9
  http: ^1.2.1
  shared_preferences: ^2.2.3
  image_picker: ^1.1.2
  provider: ^6.1.2
  fl_chart: ^0.68.0
  permission_handler: ^11.3.1
  intl: ^0.19.0
  path_provider: ^2.1.3
  uuid: ^4.4.0
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  mockito: ^5.4.4
  build_runner: ^2.4.9

flutter:
  uses-material-design: true
  assets:
    - assets/images/
  fonts:
    - family: JetBrainsMono
      fonts:
        - asset: assets/fonts/JetBrainsMono-Regular.ttf
